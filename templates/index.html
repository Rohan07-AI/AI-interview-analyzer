<html>
<head>
    <title>AI Interview Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

    <div class="card p-4 shadow text-dark" style="width: 500px;">

        <h3 class="text-center mb-3">AI Interview Analyzer</h3>

        <!-- Question Dropdown -->
        <form method="POST">

            <label class="mb-2"><b>Select Question:</b></label>
            <select name="question" class="form-control mb-3">
                <option>Tell me about a challenge you faced</option>
                <option>Describe a leadership experience</option>
                <option>How do you handle failure?</option>
            </select>

            <!-- Answer Box -->
            <textarea name="answer" class="form-control mb-3" rows="5" placeholder="Type your answer here..." required></textarea>

            <button class="btn btn-primary w-100">Analyze Answer</button>

        </form>

    </div>

</div>

</body>
</html>
