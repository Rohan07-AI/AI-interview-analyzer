<html>
<head>
    <title>AI Analysis Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow text-center">

        <h2 class="mb-3">AI Interview Analysis</h2>

        <!-- Score -->
        <h1 class="text-success">{{ score }}/100</h1>

        <!-- Progress Bar -->
        <div class="progress mt-3 mb-4" style="height: 25px;">
            <div class="progress-bar bg-success" role="progressbar" 
                 style="width: {{ score }}%;">
                {{ score }}%
            </div>
        </div>

        <!-- Analysis Details -->
        <p><b>Sentiment:</b> {{ sentiment }}</p>
        <p><b>Keyword Strength:</b> {{ keywords }}</p>
        <p><b>Confidence Level:</b> {{ confidence }}</p>

        <!-- Feedback Box -->
        <div class="alert alert-info mt-3">
            <b>AI Feedback:</b> {{ feedback }}
        </div>

        <a href="/" class="btn btn-dark mt-3">Try Again</a>

    </div>
</div>

</body>
</html>
